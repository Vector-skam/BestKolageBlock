    <title>Коллаж Фото 🖼️ — Онлайн редактор коллажей</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;

            color: #fff;
            min-height: 100vh;
            display: flex;

        h1 {
            font-size: 2.6rem;
            background: linear-gradient(90deg, #ff00cc, #00ffcc);

            opacity: 0.8;

        .controls {
            display: flex;
            gap: 15px;

            justify-content: center;
        }

        button {
            padding: 15px 32px;

        button#uploadBtn { background: #ff00cc; color: white; }
        button#randomBtn { background: #00ffcc; color: #000; }

        button:hover, button:active { transform: scale(1.08); }

        #collage {
            position: relative;
            width: 100%;
            max-width: 1180px;
            height: 640px;
            background: #0f0f0f;
            border: 12px solid #1a1a1a;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
            touch-action: none;
        }

        #collage img {
            position: absolute;
            border: 8px solid #ffffff;
            border-radius: 16px;
            box-shadow: 10px 15px 35px rgba(0,0,0,0.6);
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }

        /* Хендл ресайза — большой и удобный для пальца */
        .resize-handle {
            position: absolute;
            right: -8px;
            bottom: -8px;
            width: 36px;
            height: 36px;
            background: #00ffcc;
            border: 5px solid #fff;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 30;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #000;
            font-weight: bold;
        }

        #collage img:hover .resize-handle,
        #collage img:active .resize-handle {
            opacity: 1;
        }

        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            z-index: 5;
        }

<body>

    <h1>Коллаж Фото</h1>
    <p class="subtitle">Перетаскивай пальцем • Меняй размер за угол • Работает круто на телефоне</p>

    <div class="controls">
        <button id="uploadBtn">📸 Загрузить фото</button>
        <button id="randomBtn">🖼️ Рандом</button>
    </div>

    <div id="collage">
        <div class="empty-state">
            <h3>Пока пусто...</h3>
            <p>Загрузи фото и твори пальцами</p>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">

    <script>
        const collage = document.getElementById('collage');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const randomBtn = document.getElementById('randomBtn');

        let photos = [];
        let currentTouchTarget = null;

        // Человеческий рандом (оптимизирован)
        function placePhotoHumanLike(img) {
            const cw = collage.clientWidth;
            const ch = collage.clientHeight;

            let width = 160 + Math.random() * 260;
            if (Math.random() < 0.23) width += 100;

            img.style.width = width + 'px';

            const tryPlace = () => {
                const w = img.offsetWidth;
                const h = img.offsetHeight;

                let bestX = 0, bestY = 0, bestScore = -9999;
                const attempts = 70;

                for (let i = 0; i < attempts; i++) {
                    let x = (cw - w) * (0.08 + Math.random() * 0.84);
                    let y = (ch - h) * (0.08 + Math.random() * 0.84);

                    if (w > 360) {
                        x = x * 0.4 + (cw - w) * 0.5 * 0.6;
                        y = y * 0.4 + (ch - h) * 0.5 * 0.6;
                    }

                    img.style.left = x + 'px';
                    img.style.top = y + 'px';

                    let score = 140;
                    for (let p of photos) {
                        if (p === img) continue;
                        const overlap = getOverlapPercent(img, p);
                        if (overlap > 10) score -= (overlap - 10) * 13;
                    }

                    let closeness = 0;
                    for (let p of photos) {
                        if (p === img) continue;
                        const dx = (x + w/2) - (parseFloat(p.style.left || 0) + p.offsetWidth/2);
                        const dy = (y + h/2) - (parseFloat(p.style.top || 0) + p.offsetHeight/2);
                        closeness += Math.max(0, 220 - Math.hypot(dx, dy));
                    }
                    score -= closeness * 0.15;

                    if (score > bestScore) {
                        bestScore = score;
                        bestX = x;
                        bestY = y;
                    }
                }

                img.style.left = bestX + 'px';
                img.style.top = bestY + 'px';
                img.style.transform = `rotate(${Math.random() * 26 - 13}deg)`;

                img.style.opacity = '0';
                setTimeout(() => {
                    img.style.transition = 'all 0.6s cubic-bezier(0.34,1.56,0.64,1)';
                    img.style.opacity = '1';
                }, 20);

                photos.push(img);
            };

            if (img.complete) tryPlace();
            else img.onload = tryPlace;
        }

        function getOverlapPercent(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            const c = collage.getBoundingClientRect();

            const left = Math.max(r1.left - c.left, r2.left - c.left);
            const right = Math.min(r1.right - c.left, r2.right - c.left);
            const top = Math.max(r1.top - c.top, r2.top - c.top);
            const bottom = Math.min(r1.bottom - c.top, r2.bottom - c.top);

            const overlapArea = Math.max(0, right - left) * Math.max(0, bottom - top);
            return (overlapArea / (r1.width * r1.height)) * 100 || 0;
        }

        // Универсальная функция для мыши и тача
        function makeInteractive(img) {
            let dragging = false;
            let resizing = false;
            let startX = 0, startY = 0;
            let origLeft = 0, origTop = 0, origWidth = 0;

            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            handle.innerHTML = '↘';
            img.appendChild(handle);

            // Обработка touch и mouse вместе
            function startMove(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (e.target === handle) {
                    resizing = true;
                    startX = clientX;
                    origWidth = img.offsetWidth;
                    img.style.transition = 'none';
                    e.preventDefault();
                    return;
                }

                // Перетаскивание
                dragging = true;
                startX = clientX;
                startY = clientY;
                origLeft = parseFloat(img.style.left) || 0;
                origTop = parseFloat(img.style.top) || 0;
                img.style.zIndex = 9999;
                img.style.transition = 'none';
                e.preventDefault();
            }

            function move(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (dragging) {
                    img.style.left = (origLeft + clientX - startX) + 'px';
                    img.style.top = (origTop + clientY - startY) + 'px';
                }

                if (resizing) {
                    let newW = origWidth + (clientX - startX);
                    if (newW < 90) newW = 90;
                    img.style.width = newW + 'px';
                }
            }

            function endMove() {
                dragging = false;
                resizing = false;
                img.style.transition = 'all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
            }

            // Mouse events
            img.addEventListener('mousedown', startMove);
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', endMove);

            // Touch events (сенсор)
            img.addEventListener('touchstart', startMove, { passive: false });
            document.addEventListener('touchmove', move, { passive: false });
            document.addEventListener('touchend', endMove);

            // Двойной тап / двойной клик для удаления
            let lastTap = 0;
            img.addEventListener('touchend', e => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 500 && tapLength > 0) {
                    // двойной тап
                    if (e.target !== handle) {
                        img.style.opacity = '0';
                        img.style.transform = 'scale(0.7) rotate(20deg)';
                        setTimeout(() => {
                            img.remove();
                            photos = photos.filter(p => p !== img);
                            if (photos.length === 0) collage.querySelector('.empty-state').style.display = 'block';
                        }, 300);
                    }
                }
                lastTap = currentTime;
            });

            img.addEventListener('dblclick', () => {
                img.style.opacity = '0';
                img.style.transform = 'scale(0.7) rotate(20deg)';
                setTimeout(() => {
                    img.remove();
                    photos = photos.filter(p => p !== img);
                    if (photos.length === 0) collage.querySelector('.empty-state').style.display = 'block';
                }, 300);
            });
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.position = 'absolute';
                    collage.appendChild(img);

                    collage.querySelector('.empty-state').style.display = 'none';

                    placePhotoHumanLike(img);
                    makeInteractive(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function humanRandomAction() {
            const all = [...photos];
            all.forEach((img, i) => {
                img.style.transition = 'all 0.75s cubic-bezier(0.68,-0.55,0.27,1.55)';
                img.style.transform = `scale(0.72) rotate(${Math.random()*36 - 18}deg)`;
                setTimeout(() => placePhotoHumanLike(img), i * 70);
            });
        }

        // Кнопки
        uploadBtn.onclick = () => fileInput.click();
        randomBtn.onclick = humanRandomAction;

        fileInput.onchange = e => {
            if (e.target.files.length) {
                handleFiles(e.target.files);
                e.target.value = '';
            }
        };

        // Клавиша R на компьютере
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') humanRandomAction();
        });
    </script>
</body>
