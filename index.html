    <style>
        /* ============================================
           ПЕРЕМЕННЫЕ ЦВЕТОВОЙ СХЕМЫ
           ============================================ */
        :root {
            --vanille: #fefdf5;
            --turquoise: #40e0d0;
            --text: #2c3e50;
            --sidebar-w: 260px;
        }

        /* ============================================
           БАЗОВЫЕ СТИЛИ
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vanille);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           ЛЕВОЕ МЕНЮ (САЙДБАР)
           ============================================ */
        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 14px;
            color: var(--turquoise);
            margin-bottom: 15px;
            text-align: center;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .nav-item:hover {
            background: var(--turquoise);
            color: white;
            border-color: var(--turquoise);
        }

        .sidebar-footer {
            margin-top: auto;
            font-size: 10px;
            opacity: 0.5;
            text-align: center;
        }

        /* ============================================
           ПРАВАЯ ЧАСТЬ - ВИДЕОЭКРАНЫ
           ============================================ */
        .viewport-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .frame-section {
            flex: 1;
            position: relative;
            border-bottom: 2px solid var(--turquoise);
            overflow: hidden;
        }

        .frame-section:last-child {
            border-bottom: none;
        }

        .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: var(--turquoise);
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            border-radius: 5px;
            z-index: 5;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ============================================
           АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ
           ============================================ */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                border-right: none;
                border-bottom: 1px solid #eee;
            }

            .nav-item {
                margin-right: 10px;
                min-width: 120px;
                margin-bottom: 0;
            }

            .sidebar-footer {
                margin-left: auto;
                margin-top: 0;
            }

            .viewport-container {
                height: calc(100vh - 80px);
            }
        }

        /* ============================================
           МОДАЛЬНОЕ ОКНО (DISCLAIMER)
           ============================================ */
        #web3-legal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            font-family: sans-serif;
        }

        .web3-modal {
            background: #0d1117;
            color: #e6edf3;
            width: 90%;
            max-width: 550px;
            border-radius: 15px;
            border: 1px solid #30363d;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0, 255, 163, 0.2);
        }

        .web3-modal h2 {
            text-align: center;
            color: #58a6ff;
            margin-bottom: 15px;
        }

        .web3-content {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #21262d;
            padding: 15px;
            border-radius: 8px;
            background: #010409;
            font-size: 13px;
            line-height: 1.6;
            color: #8b949e;
            margin: 15px 0;
        }

        .web3-content p {
            margin-bottom: 10px;
        }

        .web3-content ul {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .web3-content li {
            margin-bottom: 5px;
        }

        .web3-confirm-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .web3-confirm-btn:hover {
            background: #2ea043;
        }

        /* Скролбар для модальной информации */
        .web3-content::-webkit-scrollbar {
            width: 6px;
        }

        .web3-content::-webkit-scrollbar-track {
            background: #010409;
        }

        .web3-content::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        .web3-content::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>

<body>

    <!-- ============================================
         СКРИПТ ДЛЯ УПРАВЛЕНИЯ МОДАЛЬНЫМ ОКНОМ
         ============================================ -->
    <script>
        /**
         * Инициализация модального окна с Legal Disclaimer
         * Показывается при каждой загрузке страницы
         */
        function initWeb3LegalModal() {
            // Создаем стили для модального окна
            const style = document.createElement('style');
            style.textContent = `
                #web3-legal-overlay {
                    animation: fadeIn 0.3s ease-in;
                }

                @keyframes fadeIn {
                    from {
                        opacity: 0;
                    }
                    to {
                        opacity: 1;
                    }
                }

                .web3-modal {
                    animation: slideUp 0.3s ease-out;
                }

                @keyframes slideUp {
                    from {
                        transform: translateY(20px);
                        opacity: 0;
                    }
                    to {
                        transform: translateY(0);
                        opacity: 1;
                    }
                }
            `;
            document.head.appendChild(style);

            // Блокируем скролл основной страницы
            document.body.style.overflow = 'hidden';

            // Создаем разметку модального окна
            const overlay = document.createElement('div');
            overlay.id = 'web3-legal-overlay';
            overlay.innerHTML = `
                <div class="web3-modal">
                    <h2>Legal Disclaimer</h2>
                    <div class="web3-content">
                        <p><b>ВНИМАНИЕ:</b> Вы входите на сайт web3my.netlify.app.</p>

                        <p>Используя данный ресурс, вы подтверждаете, что:</p>

                        <ul>
                            <li>Осознаете риски потери цифровых активов.</li>
                            <li>Действуете в соответствии с местным законодательством.</li>
                            <li>Не будете предъявлять претензий разработчикам в случае программных сбоев.</li>
                            <li>Ваши приватные ключи находятся только под вашим контролем.</li>
                        </ul>

                        <p>Данное предупреждение будет появляться при каждом входе в целях безопасности и напоминания о правилах платформы.</p>
                    </div>

                    <button id="web3-close-modal" class="web3-confirm-btn">
                        Я ПОНИМАЮ И СОГЛАСЕН
                    </button>
                </div>
            `;

            // Добавляем модальное окно в DOM
            document.body.appendChild(overlay);

            // Логика закрытия модального окна
            document.getElementById('web3-close-modal').addEventListener('click', () => {
                overlay.remove();
                document.body.style.overflow = 'auto';
            });
        }

        // Инициализируем модальное окно при загрузке страницы
        document.addEventListener('DOMContentLoaded', initWeb3LegalModal);
    </script>
