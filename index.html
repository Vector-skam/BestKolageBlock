<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB3 DUAL TERMINAL | VECTOR-SKAM</title>
    <style>
        :root {
            --vanille: #fefdf5;
            --turquoise: #40e0d0;
            --text: #2c3e50;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--vanille);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ЛЕВОЕ МЕНЮ */
        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--turquoise);
            color: white;
        }

        /* ПРАВАЯ ЧАСТЬ - ДВА ЭКРАНА */
        .viewport-container {
            flex: 1;
            display: flex;
            flex-direction: column; /* Располагаем фреймы друг под другом */
            height: 100%;
        }

        .frame-section {
            flex: 1; /* Каждый фрейм занимает 50% высоты */
            position: relative;
            border-bottom: 2px solid var(--turquoise);
        }

        .frame-section:last-child { border-bottom: none; }

        .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: var(--turquoise);
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            border-radius: 5px;
            z-index: 5;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* АДАПТИВНОСТЬ ДЛЯ МОБИЛОК */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                overflow-x: auto; 
                padding: 10px;
            }
            .nav-item { margin-right: 10px; min-width: 120px; margin-bottom: 0; }
            .viewport-container { height: calc(100vh - 80px); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size: 14px; color: var(--turquoise); margin-bottom: 15px; text-align: center;">DASHBOARD</h2>
        <div class="nav-item" onclick="location.href='https://web3trade.netlify.app'">Trade Full</div>
        <div class="nav-item" onclick="location.href='https://web3video.netlify.app'">Video Full</div>
        <div class="nav-item" onclick="location.href='https://web3cp.netlify.app'">Hub Main</div>
        <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">VECTOR-SKAM © 2026</div>
    </nav>

    <div class="viewport-container">
        
        <div class="frame-section">
            <div class="label">TRADING TERMINAL</div>
            <iframe src="https://web3trade.netlify.app"></iframe>
        </div>

        <div class="frame-section">
            <div class="label">VIDEO VIEWER 3x3</div>
            <iframe src="https://web3video.netlify.app"></iframe>
        </div>

    </div>

</body>
</html>
