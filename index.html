<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB3 DUAL TERMINAL | VECTOR-SKAM</title>
    <style>
        :root {
            --vanille: #fefdf5;
            --turquoise: #40e0d0;
            --text: #2c3e50;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--vanille);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ЛЕВОЕ МЕНЮ */
        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--turquoise);
            color: white;
        }

        /* ПРАВАЯ ЧАСТЬ - ДВА ЭКРАНА */
        .viewport-container {
            flex: 1;
            display: flex;
            flex-direction: column; /* Располагаем фреймы друг под другом */
            height: 100%;
        }

        .frame-section {
            flex: 1; /* Каждый фрейм занимает 50% высоты */
            position: relative;
            border-bottom: 2px solid var(--turquoise);
        }

        .frame-section:last-child { border-bottom: none; }

        .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: var(--turquoise);
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            border-radius: 5px;
            z-index: 5;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* АДАПТИВНОСТЬ ДЛЯ МОБИЛОК */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                overflow-x: auto; 
                padding: 10px;
            }
            .nav-item { margin-right: 10px; min-width: 120px; margin-bottom: 0; }
            .viewport-container { height: calc(100vh - 80px); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size: 14px; color: var(--turquoise); margin-bottom: 15px; text-align: center;">DASHBOARD</h2>
        <div class="nav-item" onclick="location.href='https://web3trade.netlify.app'">Trade Full</div>
        <div class="nav-item" onclick="location.href='https://web3video.netlify.app'">Video Full</div>
        <div class="nav-item" onclick="location.href='https://web3audio.netlify.app'">Audio Fun</div>
        <div class="nav-item" onclick="location.href='https://web3cp.netlify.app'">Hub Main</div>
        <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">VECTOR-SKAM © 2026</div>
    </nav>

    <div class="viewport-container">
        
        <div class="frame-section">
            <div class="label">TRADING TERMINAL</div>
            <iframe src="https://web3trade.netlify.app"></iframe>
        </div>

        <div class="frame-section">
            <div class="label">VIDEO VIEWER 3x3</div>
            <iframe src="https://web3video.netlify.app"></iframe>
        </div>

    </div>

</body>
</html>
<script>
    function initWeb3LegalAlert() {
    if (localStorage.getItem('web3_agreed_full')) return;

    const style = document.createElement('style');
    style.textContent = `
        #web3-legal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); font-family: 'Inter', system-ui, sans-serif;
        }
        .web3-modal {
            background: #0d1117; color: #e6edf3; width: 90%; max-width: 600px;
            border-radius: 20px; border: 1px solid #30363d; padding: 32px;
            box-shadow: 0 0 40px rgba(0, 255, 163, 0.15);
        }
        .web3-modal h2 { margin: 0 0 15px 0; color: #58a6ff; font-size: 24px; text-align: center; }
        .web3-content {
            height: 300px; overflow-y: auto; border: 1px solid #21262d;
            padding: 15px; border-radius: 8px; background: #161b22;
            font-size: 13px; line-height: 1.6; color: #8b949e; margin-bottom: 20px;
        }
        .web3-content h3 { color: #f0f6fc; font-size: 14px; margin: 15px 0 5px 0; }
        .web3-content p { margin: 0 0 10px 0; }
        .web3-footer { display: flex; flex-direction: column; gap: 10px; }
        .web3-check-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 12px; }
        .web3-check-label input { margin-top: 3px; accent-color: #238636; }
        .web3-confirm-btn {
            background: #238636; color: white; border: none; padding: 14px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .web3-confirm-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .web3-confirm-btn:not(:disabled):hover { background: #2ea043; }
        /* Стили скроллбара */
        .web3-content::-webkit-scrollbar { width: 6px; }
        .web3-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    `;
    document.head.appendChild(style);
    document.body.style.overflow = 'hidden';

    const modal = document.createElement('div');
    modal.id = 'web3-legal-overlay';
    modal.innerHTML = `
        <div class="web3-modal">
            <h2>Terms of Service</h2>
            <div class="web3-content">
                <p>Добро пожаловать на <b>web3my.netlify.app</b>. Пожалуйста, внимательно ознакомьтесь с данным соглашением перед использованием сервиса.</p>
                
                <h3>1. Риски криптовалют и смарт-контрактов</h3>
                <p>Использование технологий блокчейн, смарт-контрактов и криптоактивов сопряжено с высоким риском. Вы подтверждаете, что обладаете достаточными знаниями для работы с Web3-инструментами.</p>
                
                <h3>2. Отказ от ответственности</h3>
                <p>Сайт предоставляется по принципу "AS IS" (как есть). Администрация и разработчики не несут ответственности за любые убытки, потерю токенов, взломы кошельков или ошибки в работе сетей (Ethereum, BSC, Polygon и др.), возникшие в ходе использования данного ресурса.</p>
                
                <h3>3. Безопасность ключей</h3>
                <p>Вы несете единоличную ответственность за сохранность своих приватных ключей, сид-фраз и доступ к своим кошелькам (MetaMask, TrustWallet и т.д.). Мы никогда не запрашиваем вашу секретную информацию.</p>
                
                <h3>4. Соответствие законодательству</h3>
                <p>Пользователь обязан самостоятельно убедиться, что использование данного сервиса не нарушает законы его страны или юрисдикции. Вы подтверждаете, что не являетесь резидентом стран, находящихся под санкциями.</p>
                
                <h3>5. Сторонние протоколы</h3>
                <p>Любые взаимодействия с внешними протоколами (Uniswap, PancakeSwap и т.д.) регулируются условиями этих сторонних площадок.</p>
            </div>
            
            <div class="web3-footer">
                <label class="web3-check-label">
                    <input type="checkbox" id="web3-check">
                    Я подтверждаю, что мне исполнилось 18 лет, я ознакомился с рисками и принимаю условия использования сервиса в полном объеме.
                </label>
                <button id="web3-accept" class="web3-confirm-btn" disabled>ПОДТВЕРДИТЬ И ВОЙТИ</button>
            </div>
        </div>
    `;

    document.body.appendChild(modal);

    const checkbox = document.getElementById('web3-check');
    const btn = document.getElementById('web3-accept');

    checkbox.onchange = () => { btn.disabled = !checkbox.checked; };
    
    btn.onclick = () => {
        modal.remove();
        document.body.style.overflow = 'auto';
        localStorage.setItem('web3_agreed_full', 'true');
    };
}

// Вызов функции
initWeb3LegalAlert();
    
</script>
